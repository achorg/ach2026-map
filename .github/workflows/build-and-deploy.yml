name: Optimize map and deploy

on:
  push:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Optimize map
        uses: thecodingmachine/map-optimizer-action@master

      - name: Setup Node
        uses: actions/setup-node@v2
        with:
          node-version: '14.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Build scripts
        run: npm run build

      - name: Move scripts
        run: mv dist/* . || true

      - name: Commit generated files
        if: github.ref == 'refs/heads/master'
        run: |
          ls -al
          git config --global user.email "apjanco@gmail.com"
          git config --global user.name "apjanco"
          git checkout master
          git add .
          git commit -m "Adding files" || echo "No changes to commit"

      - name: Deploy
        if: github.ref == 'refs/heads/master'
        uses: JamesIves/github-pages-deploy-action@releases/v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: gh-pages
          FOLDER: .

      - name: List workspace
        run: |
          ls -al
